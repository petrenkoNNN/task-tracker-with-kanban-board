<!DOCTYPE html>
<html>
<head>
    <title>Kanban Board</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #f0f2f5; padding: 20px; }
        h1 { margin-bottom: 20px; }
        .board { display: flex; gap: 16px; overflow-x: auto; }
        .column { flex: 1; min-width: 250px; background: white; border-radius: 8px; padding: 12px; }
        .column h2 { margin-bottom: 12px; font-size: 16px; }
        .task { background: #f9f9f9; border: 1px solid #ddd; border-radius: 6px; padding: 10px; margin-bottom: 8px; cursor: pointer; }
        .task:hover { background: #eef2ff; }
        .task-title { font-weight: 600; }
        .add-btn { background: #0066cc; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 16px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 100px auto; padding: 20px; width: 400px; border-radius: 8px; }
        input, select { width: 100%; margin: 8px 0; padding: 8px; }
        button { cursor: pointer; }
    </style>
</head>
<body>
    <h1>📋 Kanban Board</h1>
    <button class="add-btn" id="addBtn">+ Add Task</button>
    <div class="board" id="board"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add Task</h2>
            <input type="text" id="title" placeholder="Title *">
            <select id="tag">
                <option value="frontend">Frontend</option>
                <option value="backend">Backend</option>
                <option value="design">Design</option>
                <option value="devops">DevOps</option>
                <option value="qa">QA</option>
            </select>
            <select id="col">
                <option value="todo">To Do</option>
                <option value="inprog">In Progress</option>
                <option value="review">Review</option>
                <option value="done">Done</option>
            </select>
            <button id="saveBtn">Save</button>
            <button id="cancelBtn">Cancel</button>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000';
        let editId = null;

        async function load() {
            try {
                const res = await fetch(`${API}/tasks`);
                const tasks = await res.json();
                const columns = { todo: [], inprog: [], review: [], done: [] };
                tasks.forEach(t => { if (columns[t.column_id]) columns[t.column_id].push(t); });
                
                const names = { todo: 'To Do', inprog: 'In Progress', review: 'Review', done: 'Done' };
                const board = document.getElementById('board');
                board.innerHTML = Object.entries(columns).map(([id, tasks]) => `
                    <div class="column">
                        <h2>${names[id]} (${tasks.length})</h2>
                        ${tasks.map(t => `
                            <div class="task" onclick='editTask(${JSON.stringify(t)})'>
                                <div class="task-title">${escapeHtml(t.title)}</div>
                                <div style="font-size:11px; color:#666">${t.tag}</div>
                            </div>
                        `).join('')}
                    </div>
                `).join('');
            } catch(e) {
                document.getElementById('board').innerHTML = '<p>Loading... make sure server is running</p>';
            }
        }

        function escapeHtml(s) { return String(s || '').replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }

        window.editTask = function(task) {
            editId = task.id;
            document.getElementById('title').value = task.title;
            document.getElementById('tag').value = task.tag;
            document.getElementById('col').value = task.column_id;
            document.getElementById('modalTitle').innerText = 'Edit Task';
            document.getElementById('modal').style.display = 'block';
        };

        document.getElementById('addBtn').onclick = () => {
            editId = null;
            document.getElementById('title').value = '';
            document.getElementById('tag').value = 'frontend';
            document.getElementById('col').value = 'todo';
            document.getElementById('modalTitle').innerText = 'Add Task';
            document.getElementById('modal').style.display = 'block';
        };

        document.getElementById('saveBtn').onclick = async () => {
            const title = document.getElementById('title').value.trim();
            if (!title) return alert('Title required');
            
            const data = {
                title: title,
                tag: document.getElementById('tag').value,
                column_id: document.getElementById('col').value,
                assignee: '?',
                due_date: ''
            };
            
            try {
                if (editId) {
                    await fetch(`${API}/tasks/${editId}`, { 
                        method: 'PUT', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ column_id: data.column_id }) 
                    });
                } else {
                    await fetch(`${API}/tasks`, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify(data) 
                    });
                }
                document.getElementById('modal').style.display = 'none';
                load();
            } catch(e) {
                alert('Error: ' + e.message);
            }
        };

        document.getElementById('cancelBtn').onclick = () => {
            document.getElementById('modal').style.display = 'none';
        };

        load();
    </script>
</body>
</html>
